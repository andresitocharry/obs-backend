version: '3.8'

services:
  api:
    build:
      context: .
      target: base
    container_name: dqg_backend_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app:delegated
      - uploads_data:/app/uploads
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

volumes:
  uploads_data:
